# Dev NATS with a system account so Twigo's $SYS monitoring path is testable.
# no_auth_user maps plain (no-auth) connections to APP, so existing contexts
# keep working; connect as user `sys` to exercise $SYS.REQ.SERVER.* monitoring.
server_name: twigo-dev
http_port: 8222

jetstream {
  store_dir: /data
}

accounts {
  APP {
    jetstream: enabled
    users: [
      { user: app, password: app }
    ]
  }
  SYS {
    users: [
      { user: sys, password: sys }
    ]
  }
}

system_account: SYS
no_auth_user: app
