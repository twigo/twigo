services:
  nats:
    image: nats:latest
    container_name: twigo-nats
    restart: unless-stopped
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--server_name=twigo-dev"
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring (varz/connz/jsz)
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  nats-data:
