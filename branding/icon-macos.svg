<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g transform="translate(50 50) scale(0.8047)" filter="url(#iconShadow)">
  <defs>
    <clipPath id="t8sq"><rect width="512" height="512" rx="116"/></clipPath>
    <linearGradient id="t8base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C3B42"/>
      <stop offset="0.45" stop-color="#0E2832"/>
      <stop offset="1" stop-color="#081724"/>
    </linearGradient>
    <radialGradient id="t8glare" cx="0.5" cy="0" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0.01"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t8vignette" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.32"/>
    </radialGradient>
    <linearGradient id="t8rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.22" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="t8brush" color-interpolation-filters="sRGB" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.004 0.35" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="t8noise" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.93" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="t8bloomBlur" x="-80%" y="-120%" width="260%" height="340%"><feGaussianBlur stdDeviation="56"/></filter>
    <filter id="t8textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g clip-path="url(#t8sq)">
    <rect width="512" height="512" fill="url(#t8base)"/>
    <rect x="-26" y="-26" width="564" height="564" filter="url(#t8brush)" opacity="0.07"/>
    <ellipse cx="256" cy="252" rx="220" ry="130" fill="#2CC8D4" opacity="0.13" filter="url(#t8bloomBlur)"/>
    <rect width="512" height="512" fill="url(#t8glare)"/>
    <rect width="512" height="512" fill="url(#t8vignette)"/>
    <rect width="512" height="512" filter="url(#t8noise)" opacity="0.035"/>
    <rect x="1" y="1" width="510" height="510" rx="115" fill="none" stroke="#4E8A94" stroke-opacity="0.3" stroke-width="2"/>
    <rect x="3" y="3" width="506" height="506" rx="113" fill="none" stroke="url(#t8rim)" stroke-width="2.5"/>
  </g>
  <g filter="url(#t8textShadow)">
    <text x="58" y="298" font-family="Menlo" font-size="124" font-weight="700" fill="#FFFFFF">twg</text>
    <circle cx="318" cy="280" r="17" fill="#2CC8D4"/>
    <text x="358" y="298" font-family="Menlo" font-size="124" font-weight="700" fill="#2CC8D4">&gt;</text>
  </g>
</g>
</svg>
