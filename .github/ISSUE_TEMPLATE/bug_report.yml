name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what's wrong.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: What you did, and what you expected to happen instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Twigo version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: nats-version
    attributes:
      label: NATS server version
      placeholder: e.g. 2.10.x
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (no need for backticks).
      render: text
