name: PR title

# The PR title becomes the squash-merge subject on main, which git-cliff parses,
# so require it to be a Conventional Commit. Default types: feat, fix, docs,
# style, refactor, perf, test, build, ci, chore, revert.
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
