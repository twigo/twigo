name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  rust:
    # Build the backend on every shipped desktop platform, not just Linux, so a
    # platform-specific compile/clippy/test failure surfaces on the PR instead of
    # at release-tag time (the most expensive moment).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/twigo/src-tauri
          shared-key: tauri-${{ matrix.os }}
      - run: cargo fmt --manifest-path apps/twigo/src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path apps/twigo/src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/twigo/src-tauri/Cargo.toml
